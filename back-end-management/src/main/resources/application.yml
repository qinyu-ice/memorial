# 服务器相关配置
server:
  servlet:
    context-path: / # 为了便于开发此处省略应用程序上下文
  port: 8110 # 为了便于开发此处使用 http 默认端口

# spring 相关配置
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/memorial
    username: root
    password: 321520
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      max-lifetime: 1800000
      minimum-idle: 1
      maximum-pool-size: 10
      connection-test-query: select 1
      auto-commit: true
      idle-timeout: 60000