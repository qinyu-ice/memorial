# 服务器相关配置
server:
  servlet:
    context-path: / # 为了便于开发此处省略应用程序上下文
  port: 8401 # 为了便于开发此处使用 http 默认端口

# Token相关配置（与代码中@Value的key一一对应）
token:
  key: 9Z8k7X6j5B4n3M2b1V0c9L8K7J6H5G4F3D2S1A0z9x8c7v6b5n4m3l2k1j0h9g8f7d6s5a4    # Token加密密钥（建议使用32位以上随机字符串）
  iss: qinyu              # Token签发者（如：你的系统名称/域名）
  sub: user-auth                     # Token主题（如：用户认证）
  exp: 2h                         # Token过期时间（单位：秒，86400=24小时）

# spring 相关配置
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/memorial
    username: root
    password: 321520
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      max-lifetime: 1800000
      minimum-idle: 1
      maximum-pool-size: 10
      connection-test-query: select 1
      auto-commit: true
      idle-timeout: 60000

# 阿里云 OSS 配置
aliyun:
  oss:
    # 阿里云账号AccessKey ID
    access-key-id: ${ALIYUN_ACCESS_KEY_ID}  # 改用环境变量
    # 阿里云账号AccessKey Secret
    access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET}
    # OSS Endpoint
    # 参考地址：https://help.aliyun.com/document_detail/31837.html
    endpoint: oss-cn-chengdu.aliyuncs.com
    # 默认存储桶名称
    bucket-name: memorial-dazhou
    # 可选：是否使用HTTPS（推荐true）
    secure: true
    # 可选：文件上传大小限制
    max-file-size: 10MB
    # 可选：文件上传总大小限制
    max-request-size: 100MB
    # 可选：文件访问前缀（CDN域名或OSS域名，用于拼接文件访问路径）
    domain: https://your-bucket-name.oss-cn-chengdu.aliyuncs.com